<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>404 — PlayHub</title>
<script>
  // GitHub Pages redirects unknown routes here. Send them home, preserving any hash.
  location.replace((location.origin + location.pathname).replace(/[^/]*$/, '') + 'index.html' + location.hash);
</script>
<style>body{background:#0b0d17;color:#fff;font-family:system-ui;text-align:center;padding-top:30vh;}</style>
</head>
<body>
  <h1>Redirecting to PlayHub home...</h1>
  <p><a style="color:#9d8aff" href="./">Click here if not redirected</a></p>
</body>
</html>
